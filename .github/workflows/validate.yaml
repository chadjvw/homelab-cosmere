name: Validate
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'infra/**'
      - 'observability/**'
      - 'gitops/**'
      - 'repos/**'
      - 'flux/**'
      - 'bootstrap/**'
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v2
      - name: Validate
        run: mise run validate
