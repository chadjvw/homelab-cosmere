name: Validate
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'infra/**'
      - 'observability/**'
      - 'gitops/**'
      - 'repos/**'
      - 'flux/**'
      - 'bootstrap/**'
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Validate
        run: mise run validate
