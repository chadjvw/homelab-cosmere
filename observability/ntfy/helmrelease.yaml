apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  releaseName: ntfy
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          main:
            # upstream ntfy only publishes to docker.io/binwiederhier/ntfy (no ghcr.io image
            # exists - verified via ghcr.io token endpoint and upstream's release workflow,
            # which logs into Docker Hub only). Mirrored 1:1 to ghcr.io/chadjvw/ntfy via
            # .github/workflows/mirror-ntfy.yaml to keep this cluster docker.io-free.
            image:
              repository: ghcr.io/chadjvw/ntfy
              tag: v2.26.0
            env:
              TZ: America/Denver
              NTFY_BASE_URL: https://ntfy.vanwyhe.xyz
              NTFY_BEHIND_PROXY: "true"
              NTFY_LISTEN_HTTP: ":8080"
              NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
              NTFY_AUTH_FILE: /var/lib/ntfy/user.db
              NTFY_AUTH_DEFAULT_ACCESS: deny-all
              NTFY_AUTH_ACCESS: "alertmanager:alerts:wo,chad:alerts:ro"
              # composed by the ntfy-secrets ExternalSecret template from Doppler-held
              # bcrypt hashes: "alertmanager:<hash>:user,chad:<hash>:user"
              NTFY_AUTH_USERS:
                valueFrom:
                  secretKeyRef:
                    name: ntfy-secrets
                    key: authUsers
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
    persistence:
      data:
        existingClaim: ntfy-data-nvmeof
        globalMounts:
          - path: /var/lib/ntfy
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    route:
      main:
        hostnames:
          - ntfy.vanwyhe.xyz
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external
            namespace: kube-system
            sectionName: https
