apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-secrets
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: ntfy-secrets
    template:
      engineVersion: v2
      data:
        # declarative ntfy user provisioning (auth-users format: user:bcrypt-hash:role)
        authUsers: "alertmanager:{{ .alertmanagerHash }}:user,chad:{{ .chadHash }}:user"
        # full config file for the ntfy-alertmanager bridge (davyjones); password here
        # is the plaintext counterpart of alertmanagerHash, used for HTTP basic auth
        config.toml: |
          [topic]
          default = "alerts"
          label = "topic"

          [ntfy]
          url = "http://ntfy.monitoring.svc.cluster.local:8080"
          username = "alertmanager"
          password = "{{ .alertmanagerPassword }}"
  data:
    - secretKey: alertmanagerHash
      remoteRef:
        key: NTFY_ALERTMANAGER_PASSWORD_HASH
    - secretKey: chadHash
      remoteRef:
        key: NTFY_CHAD_PASSWORD_HASH
    - secretKey: alertmanagerPassword
      remoteRef:
        key: NTFY_ALERTMANAGER_PASSWORD
