apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pve-exporter
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  releaseName: pve-exporter
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/prometheus-pve/prometheus-pve-exporter
              tag: 3.9.0
            env:
              PVE_USER: pve-exporter@pve
              PVE_TOKEN_NAME: prometheus
              PVE_TOKEN_VALUE:
                valueFrom:
                  secretKeyRef:
                    name: pve-exporter-secrets
                    key: tokenValue
              # pveproxy serves a self-signed cert on 8006
              PVE_VERIFY_SSL: "false"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
    service:
      main:
        controller: main
        ports:
          http:
            port: 9221
