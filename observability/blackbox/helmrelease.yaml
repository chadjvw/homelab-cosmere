apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  releaseName: blackbox
  install:
    createNamespace: true
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: 11.15.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  values: {}
