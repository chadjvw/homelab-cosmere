apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: grafana-oidc
  data:
    - secretKey: clientSecret
      remoteRef:
        key: GRAFANA_OIDC_CLIENT_SECRET
