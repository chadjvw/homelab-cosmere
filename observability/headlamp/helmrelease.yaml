apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: headlamp
  chart:
    spec:
      chart: headlamp
      version: "0.40.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 12h
  values:
    clusterRoleBinding:
      create: true
      clusterRoleName: cluster-admin
    env:
      - name: TZ
        value: America/Denver
    config:
      pluginsDir: /headlamp/plugins
      oidc:
        clientID: "headlamp"
        clientSecretName: headlamp-oidc
        clientSecretKey: clientSecret
        issuerURL: "https://auth.vanwyhe.xyz/application/o/headlamp/"
        scopes: "openid email profile"
    initContainers:
      - name: flux-plugin
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:latest
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        command: ["/bin/sh", "-c"]
        args:
          - cp -r /plugins/. /headlamp/plugins/ && chown -R 100:101 /headlamp/plugins
        volumeMounts:
          - name: plugins
            mountPath: /headlamp/plugins
    volumes:
      - name: plugins
        emptyDir: {}
    volumeMounts:
      - name: plugins
        mountPath: /headlamp/plugins
    service:
      type: ClusterIP
      port: 80
    httpRoute:
      enabled: true
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: internal
          namespace: kube-system
          sectionName: https
      hostnames:
        - k8s.int.vanwyhe.xyz
