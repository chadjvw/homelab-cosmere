apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: headlamp-oidc
    template:
      data:
        OIDC_CLIENT_ID: "{{ .clientID }}"
        OIDC_CLIENT_SECRET: "{{ .clientSecret }}"
        OIDC_ISSUER_URL: "https://auth.vanwyhe.xyz/application/o/headlamp/"
        OIDC_SCOPES: "openid email profile"
        OIDC_CALLBACK_URL: "https://k8s.int.vanwyhe.xyz/oidc-callback"
  data:
    - secretKey: clientID
      remoteRef:
        key: HEADLAMP_OIDC_CLIENT_ID
    - secretKey: clientSecret
      remoteRef:
        key: HEADLAMP_OIDC_CLIENT_SECRET
