apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: prometheus-oidc
  namespace: monitoring
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: prometheus-kube-prometheus-prometheus
  oidc:
    provider:
      issuer: https://auth.vanwyhe.xyz/oauth2/openid/prometheus-gateway
      authorizationEndpoint: https://auth.vanwyhe.xyz/ui/oauth2
      tokenEndpoint: https://auth.vanwyhe.xyz/oauth2/token
    clientID: prometheus-gateway
    clientSecret:
      name: prometheus-oidc
    redirectURL: https://prom.int.vanwyhe.xyz/oauth2/callback
    scopes:
      - profile
      - email
      - groups
