apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prometheus-oidc
  namespace: monitoring
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: prometheus-oidc
  data:
    - secretKey: client-secret
      remoteRef:
        key: PROMETHEUS_OIDC_CLIENT_SECRET
