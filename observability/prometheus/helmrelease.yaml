apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  releaseName: prometheus
  install:
    createNamespace: true
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.14.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  values:
    alertmanager:
      enabled: true
      # route/receivers merge over chart defaults (default inhibit_rules kept):
      # everything goes to the ntfy bridge; the always-firing Watchdog is nulled
      config:
        route:
          receiver: ntfy
          routes:
            - receiver: "null"
              matchers:
                - alertname = "Watchdog"
        receivers:
          - name: "null"
          - name: ntfy
            webhook_configs:
              - url: http://ntfy-alertmanager.monitoring.svc.cluster.local:8080/v1/webhooks/alerts
                send_resolved: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
              storageClassName: org.democratic-csi.nvmeof
    cleanPrometheusOperatorObjectNames: true
    coreDns:
      enabled: true
    crds:
      enabled: true
    defaultRules:
      create: true
    grafana:
      enabled: false
      forceDeployDashboards: true
    kubeApiServer:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeStateMetrics:
      enabled: true
    kubelet:
      enabled: true
    prometheus:
      route:
        main:
          enabled: true
          hostnames:
            - prom.int.vanwyhe.xyz
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: internal
              namespace: kube-system
              sectionName: https
      prometheusSpec:
        enableAdminAPI: true
        retention: 90d
        retentionSize: 8GB
        maximumStartupDurationSeconds: 300
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi
              storageClassName: org.democratic-csi.nvmeof
    prometheus-node-exporter:
      extraArgs:
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
        - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
        - --collector.netdev.device-exclude=^veth.+$
      podLabels:
        jobLabel: node
