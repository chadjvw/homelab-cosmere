apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  releaseName: dcgm-exporter
  install:
    createNamespace: true
  chart:
    spec:
      chart: dcgm-exporter
      version: 4.8.2
      sourceRef:
        kind: HelmRepository
        name: nvidia-dcgm
        namespace: flux-system
      interval: 12h
  values:
    runtimeClassName: nvidia
    nodeSelector:
      nvidia-gpu: quadro-p2000
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: nvidia-gpu
                  operator: Exists
    serviceMonitor:
      enabled: true
