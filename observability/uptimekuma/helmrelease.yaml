apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptimekuma
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  releaseName: uptimekuma
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        replicas: 1
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          main:
            # louislam publishes uptime-kuma to ghcr.io directly (not docker-hub-only),
            # verified via the ghcr.io token endpoint - no mirror workflow needed.
            image:
              repository: ghcr.io/louislam/uptime-kuma
              tag: "2.4.0"
            env:
              TZ: America/Denver
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
    persistence:
      data:
        existingClaim: uptimekuma-data-nvmeof
        globalMounts:
          - path: /app/data
    service:
      main:
        controller: main
        ports:
          http:
            port: 3001
    route:
      main:
        hostnames:
          - kuma.int.vanwyhe.xyz
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal
            namespace: kube-system
            sectionName: https
