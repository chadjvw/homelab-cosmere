apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kanidm
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/kanidm
  prune: true
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: repos
    - name: cert-manager
    - name: gateway
    - name: democratic-csi-nvmeof
    - name: external-secrets
