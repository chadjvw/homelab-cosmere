apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crowdsec-bouncer
  namespace: flux-system
spec:
  interval: 1h
  path: ./infra/crowdsec-bouncer
  prune: false # re-enable after HelmRelease is healthy
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: repos
    - name: crowdsec
    - name: envoy-gateway
    - name: gateway
    - name: external-secrets
