apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intel-device-plugins-gpu
  namespace: flux-system
spec:
  interval: 1h
  path: ./infra/intel-device-plugins-gpu
  prune: false # re-enable after HelmRelease is healthy
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: repos
    - name: intel-device-plugins-operator
