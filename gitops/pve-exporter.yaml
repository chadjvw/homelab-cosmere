apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pve-exporter
  namespace: flux-system
spec:
  interval: 1h
  path: ./observability/pve-exporter
  prune: true
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: repos
    - name: external-secrets
    - name: prometheus
