apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/metrics-server
  prune: false # re-enable after HelmRelease is healthy
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: repos
