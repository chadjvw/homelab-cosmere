apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/immich
  prune: false # re-enable after HelmRelease is healthy
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: repos
    - name: democratic-csi-nvmeof
    - name: cloudnative-pg
