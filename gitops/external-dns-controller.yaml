apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-dns-controller
  namespace: flux-system
spec:
  interval: 1h
  path: ./infra/external-dns-controller
  prune: true
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: repos
    - name: external-secrets
