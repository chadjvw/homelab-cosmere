apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/plex
  prune: true
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: repos
    - name: external-secrets
    - name: democratic-csi-iscsi
