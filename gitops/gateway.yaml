apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway
  namespace: flux-system
spec:
  interval: 1h
  path: ./infra/gateway
  prune: false # re-enable after HelmRelease is healthy
  sourceRef:
    kind: OCIRepository
    name: default
  dependsOn:
    - name: cert-manager
    - name: envoy-gateway
