apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: qbit
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        containers:
          main:
            env:
              PGID: 1000
              PUID: 1000
              TZ: America/Denver
              WEBUI_PORT: 9092
              TORRENTING_PORT: 51413
            image:
              repository: ghcr.io/linuxserver/qbittorrent
              tag: "5.1.4"
    persistence:
      config:
        existingClaim: qbittorrent-config
      downloads:
        enabled: true
        type: nfs
        server: truenas.vanwyhe.xyz
        path: /mnt/mongo/data/torrents
    service:
      main:
        controller: main
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: "10.0.40.8"
        ports:
          http:
            port: 9092
          torrent:
            port: 51413
          torrent-udp:
            port: 51413
            protocol: UDP
    route:
      main:
        hostnames:
          - qbit.int.vanwyhe.xyz
          - qbit.i.vw4.lol
          - qbit.int.vw4.lol
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal
            namespace: kube-system
            sectionName: https
