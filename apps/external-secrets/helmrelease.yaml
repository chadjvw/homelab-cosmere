apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: security
  releaseName: external-secrets
  install:
    createNamespace: true
  chart:
    spec:
      chart: external-secrets
      version: 2.0.1
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 12h
  values:
    installCRDs: true
    certController:
      serviceMonitor:
        enabled: true
        interval: "1m"
    serviceMonitor:
      enabled: true
      interval: "1m"
    webhook:
      serviceMonitor:
        enabled: true
        interval: "1m"
