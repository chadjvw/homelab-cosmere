apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kanidm-mail-sender-config
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: kanidm-mail-sender-config
    template:
      data:
        config: |
          token = "{{ .token }}"
          schedule = "*/5 * * * * * *"
          instance_display_name = "Wyhebreaker Auth"
          instance_url = "https://auth.int.vanwyhe.xyz"
          mail_from_address = "{{ .smtp_from }}"
          mail_reply_to_address = "{{ .smtp_from }}"
          mail_relay = "smtps://{{ .smtp_host }}"
          mail_username = "{{ .smtp_username }}"
          mail_password = "{{ .smtp_password }}"
          mail_connect_timeout_seconds = 15
  data:
    - secretKey: token
      remoteRef:
        key: KANIDM_MAIL_SENDER_TOKEN
    - secretKey: smtp_host
      remoteRef:
        key: SMTP_HOST
    - secretKey: smtp_username
      remoteRef:
        key: SMTP_USERNAME
    - secretKey: smtp_password
      remoteRef:
        key: SMTP_PASSWORD
    - secretKey: smtp_from
      remoteRef:
        key: SMTP_FROM
