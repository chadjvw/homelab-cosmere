apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: manyfold-config
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: org.democratic-csi.nvmeof
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: manyfold-valkey-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: org.democratic-csi.nvmeof
  resources:
    requests:
      storage: 1Gi
