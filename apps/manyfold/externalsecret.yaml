apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: manyfold-secrets
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: manyfold-secrets
  data:
    - secretKey: secret-key-base
      remoteRef:
        key: MANYFOLD_SECRET_KEY_BASE
    - secretKey: oidc-client-id
      remoteRef:
        key: MANYFOLD_OIDC_CLIENT_ID
    - secretKey: oidc-client-secret
      remoteRef:
        key: MANYFOLD_OIDC_CLIENT_SECRET
    - secretKey: smtp-host
      remoteRef:
        key: SMTP_HOST
    - secretKey: smtp-username
      remoteRef:
        key: SMTP_USERNAME
    - secretKey: smtp-password
      remoteRef:
        key: SMTP_PASSWORD
