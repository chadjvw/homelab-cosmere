apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: jellyfin
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        pod:
          securityContext:
            supplementalGroups:
              - 100
        containers:
          main:
            env:
              PGID: 1000
              PUID: 1000
              TZ: America/Denver
            image:
              repository: ghcr.io/linuxserver/jellyfin
              tag: "10.11.6"
            securityContext:
              privileged: true
    persistence:
      config:
        existingClaim: jellyfin-data-nvmeof
      cache:
        enabled: true
        existingClaim: jellyfin-cache-nvmeof
        globalMounts:
          - path: /config/cache
      tv:
        enabled: true
        type: nfs
        server: truenas.vanwyhe.xyz
        path: /mnt/mongo/data/media/tv
        globalMounts:
          - path: /media/tv
      movies:
        enabled: true
        type: nfs
        server: truenas.vanwyhe.xyz
        path: /mnt/mongo/data/media/movies
        globalMounts:
          - path: /media/movies
      music:
        enabled: true
        type: nfs
        server: truenas.vanwyhe.xyz
        path: /mnt/mongo/data/media/music
        globalMounts:
          - path: /media/music
      transcode:
        enabled: true
        type: emptyDir
      dri:
        enabled: true
        type: hostPath
        hostPathType: Directory
        hostPath: /dev/dri
    service:
      main:
        controller: main
        type: LoadBalancer
        externalTrafficPolicy: Local
        ports:
          http:
            port: 8096
    route:
      main:
        hostnames:
          - jellyfin.vanwyhe.xyz
          - jellyfin.vw4.lol
          - jf.vw4.lol
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - group: ""
                kind: Service
                name: jellyfin
                namespace: default
                port: 8096
                weight: 1
            timeouts:
              request: 2h
