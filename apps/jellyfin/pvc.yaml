apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-data-nvmeof
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: org.democratic-csi.nvmeof
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-cache-nvmeof
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: org.democratic-csi.nvmeof
