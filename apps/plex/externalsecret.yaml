apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: plex-claim-token
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: plex-claim-token
    template:
      data:
        PLEX_CLAIM: "{{ .PLEX_CLAIM_TOKEN }}"
  data:
    - secretKey: PLEX_CLAIM_TOKEN
      remoteRef:
        key: PLEX_CLAIM_TOKEN
