apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-red
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: node-red
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: docker.io/kennethreitz/httpbin
              tag: latest
            env:
              PGID: 1000
              PUID: 1000
              TZ: America/Denver
    persistence:
      data:
        existingClaim: node-red-data
    service:
      main:
        controller: main
        type: LoadBalancer
        externalTrafficPolicy: Local
        ports:
          http:
            port: 1880
    route:
      main:
        hostnames:
          - node-red.int.vanwyhe.xyz
          - node-red.i.vw4.lol
          - node-red.int.vw4.lol
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal
            namespace: kube-system
            sectionName: https
