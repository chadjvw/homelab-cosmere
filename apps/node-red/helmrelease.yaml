apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-red
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: node-red
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          main:
            # renovate: datasource=docker depName=ghcr.io/node-red/node-red
            image:
              repository: ghcr.io/node-red/node-red
              tag: "5.0.1"
            env:
              TZ: America/Denver
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
    persistence:
      data:
        existingClaim: node-red-data-nvmeof
        globalMounts:
          - path: /data
    service:
      main:
        controller: main
        type: LoadBalancer
        externalTrafficPolicy: Local
        ports:
          http:
            port: 1880
    route:
      main:
        hostnames:
          - node-red.int.vanwyhe.xyz
          - node-red.i.vw4.lol
          - node-red.int.vw4.lol
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal
            namespace: kube-system
            sectionName: https
