apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-selfie-timelapse
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: immich-selfie-timelapse
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: intel-igpu
                        operator: Exists
          securityContext:
            fsGroup: 1000
        containers:
          main:
            image:
              # renovate: datasource=docker depName=docker.io/arnaudcayrol/immich-selfie-timelapse
              repository: arnaudcayrol/immich-selfie-timelapse
              tag: "2.2.1"
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
            env:
              IMMICH_BASE_URL: http://immich-server:2283
              IMMICH_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: immich-selfie-timelapse
                    key: apiKey
    persistence:
      config:
        existingClaim: immich-selfie-timelapse-config
        globalMounts:
          - path: /app/config
      output:
        existingClaim: immich-library
        globalMounts:
          - path: /app/output
            subPath: external/timelapse-videos
    service:
      main:
        controller: main
        ports:
          http:
            port: 5000
    route:
      main:
        hostnames:
          - timelapse.int.vanwyhe.xyz
          - timelapse.i.vw4.lol
          - timelapse.int.vw4.lol
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal
            namespace: kube-system
            sectionName: https
