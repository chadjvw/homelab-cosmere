apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: mealie
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        containers:
          main:
            env:
              PGID: 1000
              PUID: 1000
              TZ: America/Denver
              ALLOW_SIGNUP: "false"
              BASE_URL: https://noms.vanwyhe.xyz
              TOKEN_TIME: 720
              OIDC_AUTH_ENABLED: "true"
              OIDC_SIGNUP_ENABLED: "false"
              OIDC_PROVIDER_NAME: Wyhebreaker
              OIDC_USER_GROUP: media_users@auth.vanwyhe.xyz
              OIDC_ADMIN_GROUP: media_admin@auth.vanwyhe.xyz
              OIDC_CLIENT_ID: mealie
              OIDC_CONFIGURATION_URL: https://auth.vanwyhe.xyz/oauth2/openid/mealie/.well-known/openid-configuration
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.20.1
    persistence:
      config:
        existingClaim: mealie-data-nvmeof
        globalMounts:
          - path: /app/data
    service:
      main:
        controller: main
        type: LoadBalancer
        externalTrafficPolicy: Local
        ports:
          http:
            port: 9000
    route:
      main:
        hostnames:
          - noms.vanwyhe.xyz
          - noms.vw4.lol
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external
            namespace: kube-system
            sectionName: https
