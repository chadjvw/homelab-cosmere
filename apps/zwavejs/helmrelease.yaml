apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zwavejs
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: zwavejs
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        pod:
          nodeSelector:
            attached-usb: zwave
        containers:
          main:
            env:
              PGID: 1000
              PUID: 1000
              TZ: America/Denver
              ZWAVEJS_EXTERNAL_CONFIG: /usr/src/app/store/.config-db
            image:
              repository: docker.io/zwavejs/zwave-js-ui
              tag: "11.16.1"
            resources:
              limits:
                devic.es/zwave: 1
            securityContext:
              privileged: true
              allowPrivilegeEscalation: true
    persistence:
      config:
        existingClaim: zwavejs-config-nvmeof
        globalMounts:
          - path: /usr/src/app/store
    service:
      main:
        controller: main
        type: LoadBalancer
        externalTrafficPolicy: Local
        ports:
          http:
            port: 8091
          mqtt:
            port: 3000
    route:
      main:
        hostnames:
          - zwavejs.int.vanwyhe.xyz
          - zwavejs.i.vw4.lol
          - zwavejs.int.vw4.lol
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: internal
            namespace: kube-system
            sectionName: https
