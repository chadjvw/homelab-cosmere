apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: vaultwarden
  install:
    createNamespace: true
    disableWait: true
  upgrade:
    disableWait: true
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          main:
            # renovate: datasource=docker depName=ghcr.io/dani-garcia/vaultwarden
            image:
              repository: ghcr.io/dani-garcia/vaultwarden
              tag: 1.36.0
            env:
              TZ: America/Denver
              DOMAIN: https://vault.vanwyhe.xyz
              IP_HEADER: X-Forwarded-For
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-database-app
                    key: uri
              ADMIN_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-secrets
                    key: admin-token
              SIGNUPS_ALLOWED: "false"
              INVITATIONS_ALLOWED: "false"
              SHOW_PASSWORD_HINT: "false"
              PASSWORD_ITERATIONS: "2000000"
              EMERGENCY_ACCESS_ALLOWED: "true"
              SENDS_ALLOWED: "true"
              ROCKET_PORT: "8443"
              ROCKET_TLS: '{certs="/tls/tls.crt",key="/tls/tls.key"}'
              LOG_LEVEL: info
              SMTP_HOST:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-smtp
                    key: smtp-host
              SMTP_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-smtp
                    key: smtp-username
              SMTP_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-smtp
                    key: smtp-password
              SMTP_FROM:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-smtp
                    key: smtp-from
              SMTP_PORT: "465"
              SMTP_SECURITY: force_tls
              SSO_ENABLED: "true"
              SSO_ONLY: "true"
              SSO_AUTHORITY: https://auth.vanwyhe.xyz/oauth2/openid/vaultwarden
              SSO_CLIENT_ID: vaultwarden
              SSO_ROLES_ENABLED: "true"
              SSO_ROLES_TOKEN_PATH: /roles
              SSO_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: vaultwarden-secrets
                    key: sso-client-secret
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    persistence:
      data:
        existingClaim: vaultwarden-config-nvmeof
      tls:
        type: secret
        name: wildcard-vanwyhe-xyz-tls
        globalMounts:
          - path: /tls
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      main:
        controller: main
        ports:
          https:
            port: 8443
    route:
      main:
        hostnames:
          - vault.vanwyhe.xyz
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external
            namespace: kube-system
            sectionName: https
