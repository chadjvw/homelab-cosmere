apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-secrets
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: vaultwarden-secrets
  data:
    - secretKey: admin-token
      remoteRef:
        key: VAULTWARDEN_ADMIN_TOKEN
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-smtp
  namespace: default
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: vaultwarden-smtp
  data:
    - secretKey: smtp-host
      remoteRef:
        key: SMTP_HOST
    - secretKey: smtp-username
      remoteRef:
        key: SMTP_USERNAME
    - secretKey: smtp-password
      remoteRef:
        key: SMTP_PASSWORD
    - secretKey: smtp-from
      remoteRef:
        key: SMTP_FROM
