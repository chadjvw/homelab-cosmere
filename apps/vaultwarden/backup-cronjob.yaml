apiVersion: batch/v1
kind: CronJob
metadata:
  name: vaultwarden-backup
  namespace: default
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # data PVC is RWO: must land on the same node as vaultwarden to mount it
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: vaultwarden
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          initContainers:
            - name: dump
              # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
              image: ghcr.io/cloudnative-pg/postgresql:17
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  pg_dump "$DATABASE_URL" -Fc -f /backup/vaultwarden.dump
                  # attachments, sends, config.json, rsa_key* — icon_cache regenerates
                  tar -C /data -czf /backup/vaultwarden-data.tar.gz --exclude ./icon_cache .
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: vaultwarden-database-app
                      key: uri
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: data
                  mountPath: /data
                  readOnly: true
          containers:
            - name: upload
              # renovate: datasource=docker depName=amazon/aws-cli
              image: amazon/aws-cli:2.35.21
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  aws --endpoint-url "https://$B2_ENDPOINT" s3 cp /backup/vaultwarden.dump "s3://$B2_BUCKET/vaultwarden-backups/$TIMESTAMP-vaultwarden.dump"
                  aws --endpoint-url "https://$B2_ENDPOINT" s3 cp /backup/vaultwarden-data.tar.gz "s3://$B2_BUCKET/vaultwarden-backups/$TIMESTAMP-vaultwarden-data.tar.gz"
                  echo "Uploaded $TIMESTAMP dump + data tarball to B2"
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: vaultwarden-backup-b2
                      key: keyId
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vaultwarden-backup-b2
                      key: applicationKey
                - name: B2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: vaultwarden-backup-b2
                      key: bucket
                - name: B2_ENDPOINT
                  value: s3.us-west-002.backblazeb2.com
                - name: AWS_DEFAULT_REGION
                  value: us-west-002
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              emptyDir: {}
            - name: data
              persistentVolumeClaim:
                claimName: vaultwarden-config-nvmeof
                readOnly: true
