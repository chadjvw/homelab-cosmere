apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: l2-policy
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  loadBalancerIPs: true
  externalIPs: true
  interfaces:
    - "^enp+"
  serviceSelector:
    matchExpressions:
      - key: io.cilium/l2
        operator: Exists
---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: default
spec:
  blocks:
    - cidr: 10.0.40.0/24
  allowFirstLastIPs: "No"
