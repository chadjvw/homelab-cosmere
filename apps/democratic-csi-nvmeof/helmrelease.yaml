apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi-nvmeof
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: storage
  releaseName: democratic-csi
  install:
    createNamespace: true
    disableWait: true
  upgrade:
    disableWait: true
  chart:
    spec:
      chart: democratic-csi
      version: 0.15.1
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: flux-system
      interval: 12h
  values:
    csiDriver:
      name: org.democratic-csi.nvmeof
    storageClasses:
      - name: org.democratic-csi.nvmeof
        defaultClass: false
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        parameters:
          fsType: xfs
          detachedVolumesFromSnapshots: "false"
    volumeSnapshotClasses:
      - name: org.democratic-csi.nvmeof
        parameters:
          detachedSnapshots: "true"
    driver:
      existingConfigSecret: truenas-nvmeof-driver-config
      config:
        driver: freenas-api-nvmeof
    node:
      hostPID: true
      driver:
        # nvmeDirMountEnabled: false
        # nvmeDirHostPath: /etc/nvme
        # nvmeDirHostPathType: Directory
        enabled: true
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          pullPolicy: Always
          tag: v1.9.5
    controller:
      driver:
        logLevel: debug
        enabled: true
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          pullPolicy: Always
          tag: v1.9.5
