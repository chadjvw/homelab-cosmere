apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dawarich
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: default
  releaseName: dawarich
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 12h
  values:
    controllers:
      main:
        containers:
          main:
            # renovate: datasource=docker depName=freikin/dawarich
            image:
              repository: freikin/dawarich
              tag: 1.10.1
            securityContext:
              allowPrivilegeEscalation: false
            command:
              - web-entrypoint.sh
            args:
              - bin/rails
              - server
              - -p
              - "3000"
              - -b
              - "::"
            env:
              RAILS_ENV: production
              TIME_ZONE: America/Denver
              APPLICATION_HOSTS: timeline.vanwyhe.xyz,timeline.vw4.lol
              APPLICATION_PROTOCOL: https
              RAILS_LOG_TO_STDOUT: "true"
              SELF_HOSTED: "true"
              STORE_GEODATA: "true"
              PHOTON_API_HOST: dawarich-photon
              PHOTON_API_USE_HTTPS: "false"
              PUID: "1000"
              PGID: "1000"
              REDIS_URL: redis://dawarich-valkey:6379
              DOMAIN: timeline.vanwyhe.xyz
              SMTP_SERVER:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: smtp-host
              SMTP_PORT: "465"
              SMTP_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: smtp-username
              SMTP_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: smtp-password
              PROMETHEUS_EXPORTER_ENABLED: "true"
              SIDEKIQ_METRICS_URL: http://dawarich-sidekiq:9394/metrics
              METRICS_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: metrics-username
              METRICS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: metrics-password
              DATABASE_HOST:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: host
              DATABASE_PORT:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: port
              DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: dbname
              DATABASE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: username
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: password
              SECRET_KEY_BASE:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: secret-key-base
              OIDC_CLIENT_ID: dawarich
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: oidc-client-secret
              OIDC_ISSUER: https://auth.vanwyhe.xyz/oauth2/openid/dawarich
              OIDC_REDIRECT_URI: https://timeline.vanwyhe.xyz/users/auth/openid_connect/callback
              OIDC_PROVIDER_NAME: Wyhebreaker
              OIDC_PKCE_ENABLED: "true"
              ALLOW_EMAIL_PASSWORD_REGISTRATION: "false"
              ALLOW_EMAIL_PASSWORD_LOGIN: "false"
      sidekiq:
        pod:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: dawarich
                      app.kubernetes.io/controller: main
                  topologyKey: kubernetes.io/hostname
        containers:
          main:
            # renovate: datasource=docker depName=freikin/dawarich
            image:
              repository: freikin/dawarich
              tag: 1.10.1
            securityContext:
              allowPrivilegeEscalation: false
            command:
              - sidekiq-entrypoint.sh
            args:
              - sidekiq
            env:
              RAILS_ENV: production
              TIME_ZONE: America/Denver
              APPLICATION_HOSTS: timeline.vanwyhe.xyz,timeline.vw4.lol
              APPLICATION_PROTOCOL: https
              RAILS_LOG_TO_STDOUT: "true"
              SELF_HOSTED: "true"
              STORE_GEODATA: "true"
              PHOTON_API_HOST: dawarich-photon
              PHOTON_API_USE_HTTPS: "false"
              BACKGROUND_PROCESSING_CONCURRENCY: "3"
              PUID: "1000"
              PGID: "1000"
              REDIS_URL: redis://dawarich-valkey:6379
              DOMAIN: timeline.vanwyhe.xyz
              SMTP_SERVER:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: smtp-host
              SMTP_PORT: "465"
              SMTP_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: smtp-username
              SMTP_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: smtp-password
              PROMETHEUS_EXPORTER_ENABLED: "true"
              METRICS_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: metrics-username
              METRICS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: metrics-password
              DATABASE_HOST:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: host
              DATABASE_PORT:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: port
              DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: dbname
              DATABASE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: username
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-database-app
                    key: password
              SECRET_KEY_BASE:
                valueFrom:
                  secretKeyRef:
                    name: dawarich-secrets
                    key: secret-key-base
      valkey:
        containers:
          main:
            # renovate: datasource=docker depName=ghcr.io/valkey-io/valkey
            image:
              repository: ghcr.io/valkey-io/valkey
              tag: 8.1.1-alpine
            securityContext:
              allowPrivilegeEscalation: false
      photon:
        containers:
          main:
            # renovate: datasource=docker depName=ghcr.io/rtuszik/photon-docker
            image:
              repository: ghcr.io/rtuszik/photon-docker
              tag: "2.3.1"
            securityContext:
              allowPrivilegeEscalation: false
            env:
              REGION: planet
              UPDATE_STRATEGY: SEQUENTIAL
    persistence:
      data:
        existingClaim: dawarich-data
        advancedMounts:
          main:
            main:
              - path: /var/app/public
                subPath: public
              - path: /var/app/tmp/imports/watched
                subPath: watched
              - path: /var/app/storage
                subPath: storage
          sidekiq:
            main:
              - path: /var/app/public
                subPath: public
              - path: /var/app/tmp/imports/watched
                subPath: watched
              - path: /var/app/storage
                subPath: storage
      valkey-data:
        existingClaim: dawarich-valkey-data
        advancedMounts:
          valkey:
            main:
              - path: /data
      photon-data:
        existingClaim: dawarich-photon-data
        advancedMounts:
          photon:
            main:
              - path: /photon/data
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
      valkey:
        controller: valkey
        ports:
          redis:
            port: 6379
      sidekiq:
        controller: sidekiq
        ports:
          metrics:
            port: 9394
      photon:
        controller: photon
        ports:
          http:
            port: 2322
    route:
      main:
        hostnames:
          - timeline.vanwyhe.xyz
          - timeline.vw4.lol
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - group: ""
                kind: Service
                name: dawarich-main
                namespace: default
                port: 3000
                weight: 1
