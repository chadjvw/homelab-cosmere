apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: doppler
spec:
  conditions:
    - namespaces:
        - cert-manager
        - default
        - flux-system
        - monitoring
        - security
        - storage
        - system-upgrade
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: doppler-token-auth-api
            key: dopplerToken
            namespace: security
