apiVersion: tuppr.home-operations.com/v1alpha1
kind: KubernetesUpgrade
metadata:
  name: kubernetes
spec:
  # renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
  kubernetes:
    version: v1.35.3
  maintenance:
    windows:
      - start: "0 2 * * 2" # 2am every Tuesday
        duration: 4h
  healthChecks:
    - description: All nodes are Ready
      apiVersion: v1
      kind: Node
      expr: "object.status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')"
