apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: system-upgrade
  releaseName: tuppr
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      # renovate: registryUrl=oci://ghcr.io/home-operations/charts
      chart: tuppr
      version: 0.1.8
      sourceRef:
        kind: HelmRepository
        name: home-operations
        namespace: flux-system
      interval: 12h
  values:
    controller:
      logLevel: info
    metrics:
      serviceMonitor:
        enabled: true
