  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: kube-system
  releaseName: envoy-gateway
  chart:
    spec:
      chart: gateway-helm
      version: 1.7.2
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
      interval: 12h
