apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: security
  releaseName: crowdsec
  install:
    createNamespace: true
  chart:
    spec:
      chart: crowdsec
      version: "0.22.1"
      sourceRef:
        kind: HelmRepository
        name: crowdsec
        namespace: flux-system
      interval: 12h
  values:
    container_runtime: containerd
    agent:
      acquisition:
        - namespace: "*"
          podName: "*"
          program: kubernetes
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/linux"
    lapi:
      persistentVolume:
        data:
          storageClassName: org.democratic-csi.nvmeof
        config:
          storageClassName: org.democratic-csi.nvmeof
          size: 512Mi
      env:
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-secrets
              key: enrollKey
        - name: ENROLL_INSTANCE_NAME
          value: "cosmere"
        - name: ENROLL_TAGS
          value: "k8s talos"
