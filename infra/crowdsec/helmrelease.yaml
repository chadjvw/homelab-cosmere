apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: security
  releaseName: crowdsec
  install:
    createNamespace: true
  chart:
    spec:
      chart: crowdsec
      version: "0.22.1"
      sourceRef:
        kind: HelmRepository
        name: crowdsec
        namespace: flux-system
      interval: 12h
  values:
    container_runtime: containerd
    config:
      config.yaml.local: |
        db_config:
          use_wal: true
        api:
          server:
            auto_registration:
              enabled: true
              token: "${REGISTRATION_TOKEN}"
              allowed_ranges:
                - 127.0.0.1/32
                - 10.0.10.0/24   # nodes, opnsense, local devices
                - 10.0.30.0/24   # proxmox / VMs
                - 10.0.40.0/24   # load balancer pool
                - 10.244.0.0/22  # pods (3 nodes × /24)
                - 10.96.0.0/12   # services
      profiles.yaml: |
        name: appsec_ip_remediation
        filters:
          - Alert.GetScope() == "Ip" && (Alert.GetScenario() contains "appsec" || Alert.GetScenario() contains "vpatch" || Alert.GetScenario() contains "generic-")
        decisions:
          - type: ban
            duration: 4h
        on_success: break
        ---
        name: default_ip_remediation
        filters:
          - Alert.Remediation == true && Alert.GetScope() == "Ip"
        decisions:
          - type: ban
            duration: 4h
        on_success: break
        ---
        name: default_range_remediation
        filters:
          - Alert.Remediation == true && Alert.GetScope() == "Range"
        decisions:
          - type: ban
            duration: 4h
        on_success: break
    agent:
      isDeployment: true
      acquisition:
        - namespace: default
          podName: authentik-server-*
          program: authentik
          poll_without_inotify: true
        - namespace: kube-system
          podName: envoy-kube-system-*
          program: envoy-gateway
          poll_without_inotify: true
      env:
        - name: COLLECTIONS
          value: >-
            crowdsecurity/base-http-scenarios crowdsecurity/http-dos crowdsecurity/http-cve crowdsecurity/appsec-generic-rules crowdsecurity/appsec-virtual-patching crowdsecurity/linux firix/authentik yanis-kouidri/envoy
        - name: PARSERS
          value: >-
            crowdsecurity/http-logs crowdsecurity/cri-logs
        - name: DISABLE_LOCAL_API
          value: "true"
        - name: CROWDSEC_BYPASS_DB_VOLUME_CHECK
          value: "true"
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
    lapi:
      storeCAPICredentialsInSecret: true
      storeLAPICscliCredentialsInSecret: true
      persistentVolume:
        data:
          storageClassName: org.democratic-csi.nvmeof
        config:
          enabled: false
      env:
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-secrets
              key: enrollKey
        - name: ENROLL_INSTANCE_NAME
          value: "cosmere"
        - name: ENROLL_TAGS
          value: "k8s talos"
        - name: REGISTRATION_TOKEN
          valueFrom:
            secretKeyRef:
              name: crowdsec-secrets
              key: registrationToken
        - name: BOUNCER_KEY_envoy
          valueFrom:
            secretKeyRef:
              name: crowdsec-secrets
              key: envoyBouncerKey
        - name: BOUNCER_KEY_opnsense
          valueFrom:
            secretKeyRef:
              name: crowdsec-secrets
              key: opnsenseBouncerKey
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
      # Purge stale machine registrations before LAPI starts.
      # When LAPI restarts, agent/appsec pods hold cached credentials that no longer
      # match the DB entries. This init container deletes stale entries so agents
      # re-register cleanly via their own init containers.
      extraInitContainers:
        - name: purge-stale-machines
          image: crowdsecurity/crowdsec:v1.7.6
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              DB=/var/lib/crowdsec/data/crowdsec.db
              if [ ! -f "$DB" ]; then
                echo "DB not found (first run) — skipping purge."
                exit 0
              fi
              echo "Purging stale machine registrations to prevent agent/appsec crash-loops..."
              sqlite3 "$DB" "DELETE FROM machines WHERE updated_at < datetime('now', '-5 minutes');" 2>/dev/null || \
                echo "Table does not exist yet — skipping purge."
              echo "Done. Agents will re-register via their init containers."
          volumeMounts:
            - name: crowdsec-db
              mountPath: /var/lib/crowdsec/data
          resources:
            limits:
              memory: 32Mi
            requests:
              cpu: 1m
              memory: 16Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
    appsec:
      enabled: true
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules"
        - name: DISABLE_LOCAL_API
          value: "true"
        - name: CROWDSEC_BYPASS_DB_VOLUME_CHECK
          value: "true"
      acquisitions:
        - source: appsec
          listen_addr: "0.0.0.0:7422"
          appsec_configs:
            - crowdsecurity/appsec-default
          labels:
            type: appsec
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kube-prometheus-stack
