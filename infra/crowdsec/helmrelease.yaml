apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: security
  releaseName: crowdsec
  install:
    createNamespace: true
  chart:
    spec:
      chart: crowdsec
      version: "0.24.0"
      sourceRef:
        kind: HelmRepository
        name: crowdsec
        namespace: flux-system
      interval: 12h
  values:
    container_runtime: containerd
    secrets:
      externalSecret:
        name: crowdsec-secrets
        registrationTokenKey: registrationToken
        csLapiSecretKey: csLapiSecret
    config:
      config.yaml.local: |
        db_config:
          use_wal: true
          flush:
            agents_autodelete:
              cert: 60m
              login_password: 60m
        api:
          server:
            auto_registration:
              enabled: true
              token: "${REGISTRATION_TOKEN}"
              allowed_ranges:
                - 127.0.0.1/32
                - 10.0.10.0/24   # nodes, opnsense, local devices
                - 10.0.30.0/24   # proxmox / VMs
                - 10.0.40.0/24   # load balancer pool
                - 10.244.0.0/16  # pods
                - 10.96.0.0/12   # services
      profiles.yaml: |
        name: appsec_ip_remediation
        filters:
          - Alert.GetScope() == "Ip" && (Alert.GetScenario() contains "appsec" || Alert.GetScenario() contains "vpatch" || Alert.GetScenario() contains "generic-")
        decisions:
          - type: ban
            duration: 4h
        on_success: break
        ---
        name: default_ip_remediation
        filters:
          - Alert.Remediation == true && Alert.GetScope() == "Ip"
        decisions:
          - type: ban
            duration: 4h
        on_success: break
        ---
        name: default_range_remediation
        filters:
          - Alert.Remediation == true && Alert.GetScope() == "Range"
        decisions:
          - type: ban
            duration: 4h
        on_success: break
    agent:
      isDeployment: false
      acquisition:
        - namespace: kube-system
          podName: envoy-kube-system-*
          program: envoy
          poll_without_inotify: true
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/base-http-scenarios crowdsecurity/http-dos crowdsecurity/http-cve crowdsecurity/appsec-generic-rules crowdsecurity/appsec-virtual-patching crowdsecurity/linux yanis-kouidri/envoy"
        - name: PARSERS
          value: "crowdsecurity/http-logs crowdsecurity/cri-logs"
          # metrics:
          #   enabled: true
          #   serviceMonitor:
          #     enabled: true
          #     additionalLabels:
          #       release: kube-prometheus-stack
    lapi:
      persistentVolume:
        data:
          storageClassName: org.democratic-csi.nvmeof
        config:
          storageClassName: org.democratic-csi.nvmeof
          size: 512Mi
      # ponytail: CrowdSec 1.7.8 has no declarative allowlist file the LAPI loads at
      # startup (checked docs.crowdsec.net/docs/local_api/centralized_allowlists/ +
      # cscli allowlists reference) - only cscli create/add/import(CSV), and those
      # must run on the LAPI machine itself (remote cscli errors "local API is
      # disabled"). postStart on the lapi container is the least amount of
      # machinery that runs in-pod and is idempotent every reconcile/restart.
      # Re-asserts the cosmere-infra allowlist (k8s node IPs + pod CIDR) that
      # stops CrowdSec's pf-scan-multi_ports scenario from banning our own nodes.
      lifecycle:
        postStart:
          exec:
            command:
              - sh
              - -c
              - |
                set -eu
                i=0
                until cscli lapi status >/dev/null 2>&1; do
                  i=$((i + 1))
                  if [ "$i" -ge 60 ]; then
                    echo "cosmere-infra allowlist: LAPI not ready after 5m, giving up" >&2
                    exit 1
                  fi
                  sleep 5
                done
                cscli allowlists create cosmere-infra -d "k8s node IPs + pod CIDR, exempted from CrowdSec bans (homelab-cosmere infra/crowdsec)" || true
                cscli allowlists add cosmere-infra \
                  10.0.10.12 10.0.10.13 10.0.10.14 \
                  10.0.30.102 10.0.30.103 10.0.30.104 10.0.30.105 10.0.30.106 10.0.30.107 \
                  10.244.0.0/16
      env:
        - name: ENROLL_KEY
          valueFrom:
            secretKeyRef:
              name: crowdsec-secrets
              key: enrollKey
        - name: ENROLL_INSTANCE_NAME
          value: "cosmere"
        - name: ENROLL_TAGS
          value: "k8s talos"
        - name: BOUNCER_KEY_opnsense
          valueFrom:
            secretKeyRef:
              name: crowdsec-secrets
              key: opnsenseBouncerKey
              # metrics:
              #   enabled: true
              #   serviceMonitor:
              #     enabled: true
              #     additionalLabels:
              #       release: kube-prometheus-stack
    appsec:
      enabled: true
      env:
        - name: COLLECTIONS
          value: "crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules"
      acquisitions:
        - source: appsec
          listen_addr: "0.0.0.0:7422"
          appsec_configs:
            - crowdsecurity/appsec-default
          labels:
            type: appsec
      # metrics:
      #   enabled: true
      #   serviceMonitor:
      #     enabled: true
      #     additionalLabels:
      #       release: kube-prometheus-stack
