apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crowdsec-bouncer
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: security
  releaseName: envoy-proxy-bouncer
  install:
    createNamespace: false
  chart:
    spec:
      chart: envoy-proxy-bouncer
      version: "0.6.0"
      sourceRef:
        kind: HelmRepository
        name: crowdsec-bouncer
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: Secret
      name: crowdsec-bouncer-secret
      valuesKey: apiKey
      targetPath: config.bouncer.apiKey
  values:
    config:
      bouncer:
        lapiURL: http://crowdsec-service.security.svc.cluster.local:8080
    securityPolicy:
      create: false
