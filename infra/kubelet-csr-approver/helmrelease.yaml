apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: kube-system
  releaseName: kubelet-csr-approver
  chart:
    spec:
      chart: kubelet-csr-approver
      version: 1.2.13
      sourceRef:
        kind: HelmRepository
        name: postfinance
        namespace: flux-system
      interval: 12h
  values:
    replicas: 1
    providerRegex: "^[a-z]+$"
    bypassDnsResolution: true
    metrics:
      enabled: false
    limits:
      cpu: null
